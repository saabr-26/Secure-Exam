<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SecureExam</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>

<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo-section">
        <svg class="logo-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color: #00d9ff; stop-opacity: 1" />
              <stop offset="100%" style="stop-color: #00ffff; stop-opacity: 1" />
            </linearGradient>
          </defs>
          <path d="M 20 2 L 8 8 L 8 18 Q 8 30 20 36 Q 32 30 32 18 L 32 8 Z" fill="url(#logoGradient)" stroke="white"
            stroke-width="1" />
          <path d="M 15 20 L 18 23 L 26 15" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        <a href="/" class="logo-text">SecureExam</a>
      </div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li>
          <a href="#" class="signin-link" id="logoutBtn" style="display: none">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Login Section -->
  <section class="auth-section">
    <div class="auth-container">
      <h1>Login to SecureExam</h1>
      <p class="auth-subtitle">Access your exam platform securely</p>

      <form id="loginForm" class="auth-form">
        <!-- User Type Selection -->
        <div class="form-group">
          <label for="userType">Select User Type *</label>
          <select id="userType" name="userType" required>
            <option value="">-- Choose User Type --</option>
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
          </select>
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>

        <!-- Face Verification -->
        <div class="form-group">
          <label>Face Verification (Required for Security) *</label>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <video id="video" width="300" height="225" autoplay muted
              style="border: 2px solid #e2e8f0; border-radius: 8px; display: none;"></video>
            <button type="button" id="startWebcam" class="auth-btn" style="background-color: #64748b;">Start Webcam to
              Verify Face</button>
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message"></div>

        <!-- Submit Button -->
        <button type="submit" class="auth-btn">Login</button>
      </form>

      <!-- Register Link -->
      <p class="auth-footer">
        Don't have an account? <a href="/register">Register here</a>
      </p>
    </div>
  </section>

  <script>
    const loginForm = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");
    const video = document.getElementById("video");
    const startWebcamBtn = document.getElementById("startWebcam");

    let faceModelsLoaded = false;
    let streamActive = false;

    // Load face-api models
    Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri('/models'),
      faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
      faceapi.nets.faceRecognitionNet.loadFromUri('/models')
    ]).then(() => {
      faceModelsLoaded = true;
      console.log("Face measurement models loaded");
    }).catch(err => {
      console.error("Failed to load face models", err);
    });

    startWebcamBtn.addEventListener("click", async () => {
      if (!faceModelsLoaded) {
        alert("Face AI models are still loading. Please wait a few seconds.");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.style.display = "block";
        startWebcamBtn.style.display = "none";
        streamActive = true;
      } catch (err) {
        console.error("Webcam error:", err);
        alert("Please allow webcam access for face verification.");
      }
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const userType = document.getElementById("userType").value;

      errorMessage.textContent = "Processing login, holding on...";
      errorMessage.style.display = "block";

      let faceDescriptorArray = null;

      if (!streamActive || !video.srcObject) {
        errorMessage.textContent = "Please start the webcam and place your face in view to login.";
        errorMessage.style.display = "block";
        return;
      }

      errorMessage.textContent = "Scanning face, please hold still...";
      errorMessage.style.display = "block";

      const options = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.1 });
      const detection = await faceapi.detectSingleFace(video, options).withFaceLandmarks().withFaceDescriptor();
      if (detection) {
        faceDescriptorArray = Array.from(detection.descriptor);
        errorMessage.style.display = "none";
      } else {
        errorMessage.textContent = "Could not clearly detect a face. Move into better lighting and try again.";
        return;
      }

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password, userType, faceDescriptor: faceDescriptorArray })
        });

        const data = await response.json();

        if (response.ok) {
          // Redirect to dashboard
          window.location.href = "/dashboard";
        } else {
          errorMessage.textContent = data.message || "Login failed";
          errorMessage.style.display = "block";
        }
      } catch (error) {
        console.error("Error:", error);
        errorMessage.textContent = "An error occurred. Please try again.";
        errorMessage.style.display = "block";
      }
    });
  </script>
</body>

</html>
