<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SecureExam</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo-section">
          <svg
            class="logo-icon"
            viewBox="0 0 40 40"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="logoGradient"
                x1="0%"
                y1="0%"
                x2="100%"
                y2="100%"
              >
                <stop
                  offset="0%"
                  style="stop-color: #00d9ff; stop-opacity: 1"
                />
                <stop
                  offset="100%"
                  style="stop-color: #00ffff; stop-opacity: 1"
                />
              </linearGradient>
            </defs>
            <path
              d="M 20 2 L 8 8 L 8 18 Q 8 30 20 36 Q 32 30 32 18 L 32 8 Z"
              fill="url(#logoGradient)"
              stroke="white"
              stroke-width="1"
            />
            <path
              d="M 15 20 L 18 23 L 26 15"
              stroke="white"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <a href="/" class="logo-text">SecureExam</a>
        </div>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li>
            <a href="#" class="signin-link" id="logoutBtn" style="display: none"
              >Logout</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
      <div class="auth-container">
        <h1>Login to SecureExam</h1>
        <p class="auth-subtitle">Access your exam platform securely</p>

        <form id="loginForm" class="auth-form">
          <!-- User Type Selection -->
          <div class="form-group">
            <label for="userType">Select User Type *</label>
            <select id="userType" name="userType" required>
              <option value="">-- Choose User Type --</option>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
            </select>
          </div>

          <!-- Email Input -->
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password">Password *</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <!-- Error Message -->
          <div id="errorMessage" class="error-message"></div>

          <!-- Submit Button -->
          <button type="submit" class="auth-btn">Login</button>
        </form>

        <!-- Register Link -->
        <p class="auth-footer">
          Don't have an account? <a href="/register">Register here</a>
        </p>
      </div>
    </section>

    <script>
      const loginForm = document.getElementById("loginForm");
      const errorMessage = document.getElementById("errorMessage");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const userType = document.getElementById("userType").value;

        errorMessage.textContent = "";
        errorMessage.style.display = "none";

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password, userType }),
          });

          const data = await response.json();

          if (response.ok) {
            // Redirect to dashboard
            window.location.href = "/dashboard";
          } else {
            errorMessage.textContent = data.message || "Login failed";
            errorMessage.style.display = "block";
          }
        } catch (error) {
          console.error("Error:", error);
          errorMessage.textContent = "An error occurred. Please try again.";
          errorMessage.style.display = "block";
        }
      });
    </script>
  </body>
</html>
